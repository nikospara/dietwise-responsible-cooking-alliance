<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<link rel="icon" type="image/svg+xml" href="/src/assets/images/favicon.svg" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Responsible Cooking Alliance</title>
</head>
<body>
	<script>
		const params = new URLSearchParams(window.location.search);
		const code = params.get('code');
		const message = {type: 'AUTH_CALLBACK', code};
		if (typeof browser !== 'undefined') {
			browser.runtime.sendMessage(message);
		} else if (typeof chrome !== 'undefined' && typeof chrome.runtime !== 'undefined') {
			chrome.runtime.sendMessage(message);
		}
		window.close();
	</script>
</body>
</html>
